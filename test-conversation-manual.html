<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Conversation Module</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: {
              900: '#0f172a',
              800: '#1e293b',
              700: '#334155',
              600: '#475569',
              500: '#64748b',
              400: '#94a3b8',
              300: '#cbd5e1',
            },
            indigo: {
              600: '#4f46e5',
              500: '#6366f1',
              400: '#818cf8',
              300: '#a5b4fc',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0f172a;
      color: #cbd5e1;
    }
  </style>
</head>
<body class="p-8">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-white mb-6">Test Conversation Module</h1>
    
    <div class="mb-8">
      <h2 class="text-lg font-semibold text-indigo-300 mb-3">Test 1: Empty State</h2>
      <div id="test1" class="bg-slate-900 rounded-xl p-4"></div>
    </div>

    <div class="mb-8">
      <h2 class="text-lg font-semibold text-indigo-300 mb-3">Test 2: Conversation with Title</h2>
      <div id="test2" class="bg-slate-900 rounded-xl p-4"></div>
    </div>

    <div class="mb-8">
      <h2 class="text-lg font-semibold text-indigo-300 mb-3">Test 3: Conversation without Title</h2>
      <div id="test3" class="bg-slate-900 rounded-xl p-4"></div>
    </div>

    <div class="mb-8">
      <h2 class="text-lg font-semibold text-indigo-300 mb-3">Test 4: Multiple Conversations</h2>
      <div id="test4" class="bg-slate-900 rounded-xl p-4"></div>
    </div>
  </div>

  <script type="module">
    import { renderConversation } from './js/modules/conversation.js';

    // Test 1: Empty state
    const test1Container = document.getElementById('test1');
    renderConversation(test1Container, { conversations: [] });

    // Test 2: Conversation with title
    const test2Container = document.getElementById('test2');
    renderConversation(test2Container, {
      conversations: [
        {
          id: 'ch01_conv01',
          chapterId: 1,
          order: 1,
          title: 'はじめまして',
          turns: [
            {
              speaker: 'ミラー',
              japanese: 'はじめまして。マイク・ミラーです。',
              romaji: 'Hajimemashite. Maiku Miraa desu.',
              indonesian: 'Salam kenal. Saya Mike Miller.'
            },
            {
              speaker: 'たなか',
              japanese: 'たなかです。どうぞ よろしく。',
              romaji: 'Tanaka desu. Douzo yoroshiku.',
              indonesian: 'Saya Tanaka. Senang berkenalan dengan Anda.'
            }
          ]
        }
      ]
    });

    // Test 3: Conversation without title
    const test3Container = document.getElementById('test3');
    renderConversation(test3Container, {
      conversations: [
        {
          id: 'ch02_conv01',
          chapterId: 2,
          order: 1,
          turns: [
            {
              speaker: 'A',
              japanese: 'これは なんですか。',
              romaji: 'Kore wa nan desu ka.',
              indonesian: 'Apa ini?'
            },
            {
              speaker: 'B',
              japanese: 'それは じしょです。',
              romaji: 'Sore wa jisho desu.',
              indonesian: 'Itu adalah kamus.'
            }
          ]
        }
      ]
    });

    // Test 4: Multiple conversations
    const test4Container = document.getElementById('test4');
    renderConversation(test4Container, {
      conversations: [
        {
          id: 'ch01_conv01',
          chapterId: 1,
          order: 1,
          title: 'Percakapan 1',
          turns: [
            {
              speaker: 'A',
              japanese: 'おはようございます。',
              romaji: 'Ohayou gozaimasu.',
              indonesian: 'Selamat pagi.'
            }
          ]
        },
        {
          id: 'ch01_conv02',
          chapterId: 1,
          order: 2,
          title: 'Percakapan 2',
          turns: [
            {
              speaker: 'B',
              japanese: 'こんにちは。',
              romaji: 'Konnichiwa.',
              indonesian: 'Selamat siang.'
            }
          ]
        }
      ]
    });
  </script>
</body>
</html>
